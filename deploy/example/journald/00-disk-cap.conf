# Cap the system journal so a long-running deploy can't fill `/`.
#
# Install at /etc/systemd/journald.conf.d/00-disk-cap.conf (filename
# reflects what it does — it caps the *whole* system journal, since
# journald has no per-unit size limit). On a 10 GB VPS, SystemMaxUse=200M
# is ~2% of disk and covers months of leyline-server traffic plus normal
# system services.

[Journal]
SystemMaxUse=200M
RuntimeMaxUse=50M
