# Example nginx reverse-proxy in front of leyline-server. Place at
# /etc/nginx/conf.d/leyline-server.conf (or include from the main server block).
# Pair with certbot for TLS.
#
# WebSocket proxying requires explicit upgrade headers below.
#
# After certbot generates the TLS (443) server block, ensure these three
# directives are present inside it (do NOT add to the :80 block — a bad
# HSTS deploy over plain HTTP locks users out):
#   ssl_protocols TLSv1.2 TLSv1.3;                # block TLS 1.0/1.1 downgrade
#   ssl_prefer_server_ciphers off;                # let modern clients pick
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#
# leyline-server exposes everything under a single /_leyline/* prefix
# (sync, admin, api/v1, operator, health). Same-domain coexistence with
# leyline-web: put a catch-all `location / { proxy_pass http://127.0.0.1:8091; }`
# after this block to serve the web reader for everything else.

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # certbot will manage 80→443 redirect and the TLS server block.

    # leyline-server (WebSocket sync + REST) — namespaced under /_leyline/*.
    location /_leyline/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
