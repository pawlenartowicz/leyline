# leyline-server uses fsnotify to watch .leyline/vaultconfig/ inside each vault.
# Linux defaults vary (8192 on many distros) and are easily exhausted when other
# watch-heavy services share the host (editors, build watchers, file indexers).
# 65536 leaves comfortable headroom for ~13k vaults at ~5 watches each, plus
# whatever else runs on the box. Raise further if you co-locate many services.
fs.inotify.max_user_watches=65536
